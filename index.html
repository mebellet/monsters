<!DOCTYPE html>
<html>

<head>
    <title>Continuous 2D Defense Game</title>
    <script src="https://unpkg.com/jspsych@8"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2"></script>
    <script src="https://unpkg.com/@jspsych/plugin-instructions@2"></script>
    <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe@0.6.0"></script>
    <link href="https://unpkg.com/jspsych@8/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
        :root {
            --bg-color: #9fb9eb;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed; /* NEW: Stops mobile pull-to-refresh & scroll bouncing */
            background-color: #eeb2b2;
        }

        #game-container {
            width: 100vw;
            height: 100vh; /* Fallback for older browsers */
            height: 100dvh; /* NEW: Dynamic height respects mobile browser UI bars */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        canvas {
            background-color: var(--bg-color);
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
    </style>
</head>

<body>
    <div id="jspsych-target"></div>

    <script>
        const jsPsych = initJsPsych({
            display_element: 'jspsych-target',
            on_finish: function () {
                console.log("Experiment completed!");
            }
        });

        const subject_id = jsPsych.randomization.randomID(10);
        const filename = `${subject_id}.csv`;
        jsPsych.data.addProperties({ subject_id: subject_id });

        const is_touch_device = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (navigator.msMaxTouchPoints > 0);
        const action_text = is_touch_device ? "swipe" : "drag";

        const jsPsychContinuousDefense = (function (jspsych) {
            "use strict";

            const info = {
                name: "continuous-defense",
                parameters: {
                    duration: {
                        type: jspsych.ParameterType.INT,
                        default: 120000,
                        description: "Duration of the game in ms."
                    }
                }
            };

            class Plugin {
                constructor(jsPsych) {
                    this.jsPsych = jsPsych;
                }

                trial(display_element, trial) {
                    display_element.innerHTML = `
                    <div id="game-container">
                        <canvas id="gameCanvas"></canvas>
                    </div>
                `;
                    const canvas = document.getElementById('gameCanvas');
                    const ctx = canvas.getContext('2d');

                    function resizeCanvas() {
                        const container = document.getElementById('game-container');
                        // Use container dimensions which respect our new 100dvh CSS
                        canvas.width = container.clientWidth;
                        canvas.height = container.clientHeight;
                    }
                    resizeCanvas();
                    // Note: We are deleting the window.addEventListener from here and moving it lower!

                    const DASH_VELOCITY_THRESHOLD = 0.15;

                    let score = 0;
                    let bot_offensiveness = 0.0;
                    let gameStartTime = performance.now();
                    let lastFrameTime = gameStartTime;
                    let isGameOver = false;
                    let animationId;
                    let swipeData = [];

                    let audioCtx = null;

                    function playTone(freq, type, duration, vol = 1) {
                        if (!audioCtx) return;
                        try {
                            if (audioCtx.state === 'suspended') audioCtx.resume();
                            let osc = audioCtx.createOscillator();
                            let gain = audioCtx.createGain();
                            osc.type = type;
                            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                            osc.connect(gain);
                            gain.connect(audioCtx.destination);
                            osc.start();
                            osc.stop(audioCtx.currentTime + duration);
                        } catch (e) { console.error("Audio error", e); }
                    }

                    function playPositiveChime() {
                        playTone(600, 'sine', 0.1, 0.5);
                        setTimeout(() => playTone(800, 'sine', 0.2, 0.5), 100);
                    }
                    function playAversiveCrunch() {
                        playTone(100, 'sawtooth', 0.3, 0.8);
                    }
                    function playAversiveShock() {
                        playTone(150, 'square', 0.4, 0.8);
                    }
                    function playSharpAlert() {
                        playTone(400, 'triangle', 0.2, 0.9);
                    }

                    const player = {
                        homeX: canvas.width / 2,
                        homeY: canvas.height * 0.85,
                        x: canvas.width / 2,
                        y: canvas.height * 0.85,
                        radius: 60,
                        shielded: false,
                        stunTimer: 0,
                        color: '#00ffcc'
                    };

                    const bot = {
                        homeX: canvas.width / 2,
                        homeY: canvas.height * 0.15,
                        x: canvas.width / 2,
                        y: canvas.height * 0.15,
                        radius: 60,
                        flashTimer: 0,
                        color: '#ffcc00'
                    };

                    // NEW: Add the dynamic resize listener here
                    window.addEventListener('resize', () => {
                        resizeCanvas();

                        // Recalculate anchor positions so they adapt to new screen dimensions
                        player.homeX = canvas.width / 2;
                        player.homeY = canvas.height * 0.85;
                        bot.homeX = canvas.width / 2;
                        bot.homeY = canvas.height * 0.15;

                        // Ensure they immediately snap to safe bounds if the screen suddenly got smaller
                        player.y = Math.min(player.y, canvas.height);
                        bot.y = Math.max(bot.radius, Math.min(canvas.height / 2 - bot.radius, bot.y));
                    });

                    let entities = [];
                    let particles = [];
                    let spawnTimer = 0;

                    function spawnEntity() {
                        // CHANCE OF HAZARD VS CRYSTAL (e.g. 0.85 = 85% hazards, 15% crystals)
                        const isHazard = Math.random() < 0.85; 
                        const dir = Math.random() < 0.5 ? 1 : -1; // 1 = down (to player), -1 = up (to bot)
                        
                        let startVx, startVy, entityColor;
                        
                        if (isHazard) {
                            startVx = 0; // FIXED: Hazards no longer drift sideways on spawn
                            startVy = dir * (Math.random() * 3 + 3);
                            
                            // PERMANENT COLOR LOGIC: Red if moving to player, Orange if moving to bot
                            entityColor = startVy > 0 ? '#ff0033' : '#ff8c00'; 
                        } else {
                            startVx = 0; // FIXED: Crystals no longer drift sideways on spawn
                            startVy = dir * (Math.random() * 1.5 + 3);
                            entityColor = '#00ffff'; // Cyan
                        }
                        
                        const entityRadius = 50;
                        
                        entities.push({
                            type: isHazard ? 'hazard' : 'crystal',
                            // FIXED: Spawns anywhere along the X axis, padded by the radius so it doesn't clip the wall
                            x: entityRadius + Math.random() * (canvas.width - entityRadius * 2),
                            y: canvas.height / 2,
                            vx: startVx,
                            vy: startVy,
                            radius: entityRadius,
                            active: true,
                            playerDeflected: false,
                            color: entityColor 
                        });
                    }

                    let pointerDown = false;
                    let startX = 0;
                    let startY = 0;
                    let currentX = 0;
                    let currentY = 0;
                    let pointerTime = 0;
                    let maxVelocity = 0;
                    let currentVelocity = 0;
                    let pointerVx = 0;
                    let pointerVy = 0;

                    let lastSwipeAngle = null;
                    let lastSwipeTime = 0;

                    canvas.addEventListener('pointerdown', (e) => {
                        if (!audioCtx) {
                            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        }
                        if (audioCtx.state === 'suspended') audioCtx.resume();
                        pointerDown = true;
                        startX = e.clientX;
                        startY = e.clientY;
                        currentX = startX;
                        currentY = startY;
                        pointerTime = performance.now();
                        maxVelocity = 0;
                        currentVelocity = 0;
                        pointerVx = 0;
                        pointerVy = 0;

                        lastSwipeAngle = null;
                    });

                    canvas.addEventListener('pointermove', (e) => {
                        if (!pointerDown) return;
                        const now = performance.now();
                        const dt = Math.max(1, now - pointerTime);

                        if (dt > 0) {
                            const dx = e.clientX - currentX;
                            const dy = e.clientY - currentY;

                            pointerVx = dx / dt;
                            pointerVy = dy / dt;

                            currentVelocity = Math.hypot(pointerVx, pointerVy);
                            if (currentVelocity > maxVelocity) maxVelocity = currentVelocity;
                        }

                        currentX = e.clientX;
                        currentY = e.clientY;
                        pointerTime = now;

                        const deltaX = currentX - startX;
                        const deltaY = currentY - startY;

                        if (player.homeY + deltaY > canvas.height * 0.9) {
                            player.shielded = true;
                            player.x = player.homeX;
                            player.y = canvas.height * 0.95;
                        } else {
                            player.shielded = false;
                            player.x = player.homeX + deltaX * 1.5;
                            player.y = player.homeY + deltaY * 1.5;
                            player.x = Math.max(0, Math.min(canvas.width, player.x));
                            player.y = Math.max(0, Math.min(canvas.height, player.y));
                        }
                    });

                    canvas.addEventListener('pointerup', (e) => {
                        if (!pointerDown) return;
                        pointerDown = false;

                        const hazards_on_screen = entities.filter(ent => ent.type === 'hazard').length;

                        swipeData.push({
                            timestamp: performance.now() - gameStartTime,
                            swipe_angle: lastSwipeAngle,
                            peak_velocity: maxVelocity,
                            current_bot_offensiveness: bot_offensiveness,
                            hazards_on_screen: hazards_on_screen,
                            current_score: score
                        });
                    });

                    function createParticles(x, y, color) {
                        for (let i = 0; i < 15; i++) {
                            particles.push({
                                x: x, y: y,
                                vx: (Math.random() - 0.5) * 10,
                                vy: (Math.random() - 0.5) * 10,
                                life: 300 + Math.random() * 300,
                                color: color
                            });
                        }
                    }

                    function update(dt) {
                        if (isGameOver) return;
                        const timeElapsed = performance.now() - gameStartTime;

                        if (performance.now() - pointerTime > 50) {
                            currentVelocity = 0;
                            pointerVx = 0;
                            pointerVy = 0;
                        }

                        // NEW: Phased bot behavior (Cooperative -> Ramp -> Offensive)
                        const coopPhaseEnd = 30000; // 30 seconds
                        const rampPhaseEnd = 50000; // 30s + 20s ramp = 50 seconds
                        const maxOffensiveness = 0.50; // Maximum 50% hit chance
                        
                        if (timeElapsed < coopPhaseEnd) {
                            // Phase 1: Purely cooperative (0% chance)
                            bot_offensiveness = 0.0;
                        } else if (timeElapsed < rampPhaseEnd) {
                            // Phase 2: Ramping up from 0% to 50% over 20 seconds
                            const timeInRamp = timeElapsed - coopPhaseEnd;
                            const rampProgress = timeInRamp / (rampPhaseEnd - coopPhaseEnd); // 0.0 to 1.0 progress through the ramp phase
                            bot_offensiveness = maxOffensiveness * rampProgress;
                        } else {
                            // Phase 3: Maximum offensiveness for the rest of the game
                            bot_offensiveness = maxOffensiveness;
                        }
                        if (!pointerDown) {
                            player.x += (player.homeX - player.x) * 0.1;
                            player.y += (player.homeY - player.y) * 0.1;
                            player.shielded = false;
                        }

                        if (player.stunTimer > 0) player.stunTimer -= dt;
                        if (bot.flashTimer > 0) bot.flashTimer -= dt;

                        let nearestDist = Infinity;
                        let targetX = bot.homeX;
                        let targetY = bot.homeY;
                        for (let e of entities) {
                            if (e.y < canvas.height / 2 && e.vy < 0) {
                                let d = Math.abs(e.y - bot.y);
                                if (d < nearestDist) {
                                    nearestDist = d;
                                    targetX = e.x;
                                    targetY = e.y;
                                }
                            }
                        }
                        bot.x += (targetX - bot.x) * 0.02;
                        bot.y += (targetY - bot.y) * 0.02;
                        bot.y = Math.max(bot.radius, Math.min(canvas.height / 2 - bot.radius, bot.y));

                        spawnTimer -= dt;
                        if (spawnTimer <= 0) {
                            spawnEntity();
                            // SPAWN FREQUENCY: Change these numbers to make entities spawn faster or slower
                            spawnTimer = 300 + Math.random() * 300;
                        }

                        for (let i = entities.length - 1; i >= 0; i--) {
                            let e = entities[i];
                            e.x += e.vx;
                            e.y += e.vy;

                            if (e.x - e.radius < 0 || e.x + e.radius > canvas.width) {
                                if (e.type === 'crystal') {
                                    entities.splice(i, 1);
                                    continue;
                                }
                                e.vx *= -1;
                                e.x = Math.max(e.radius, Math.min(canvas.width - e.radius, e.x));
                                if (e.type === 'hazard' && Math.abs(e.vx) > 3) {
                                    score += 10;
                                    createParticles(e.x, e.y, e.color); // Matches entity color
                                    entities.splice(i, 1);
                                    continue;
                                }
                            }

                            const distToPlayer = Math.hypot(e.x - player.x, e.y - player.y);

                            if (distToPlayer < e.radius + player.radius && e.active && !e.playerDeflected) {
                                if (!player.shielded && player.stunTimer <= 0) {

                                    if (e.type === 'hazard') {
                                        if (pointerDown && currentVelocity > DASH_VELOCITY_THRESHOLD) {
                                            const mag = Math.hypot(pointerVx, pointerVy);

                                            if (mag > 0) {
                                                e.vx = (pointerVx / mag) * 12;
                                                e.vy = (pointerVy / mag) * 12;
                                                e.playerDeflected = true;

                                                let angleRad = Math.atan2(-pointerVy, pointerVx);
                                                let angleDeg = angleRad * (180 / Math.PI);
                                                if (angleDeg < 0) angleDeg += 360;

                                                lastSwipeAngle = angleDeg.toFixed(1);
                                                lastSwipeTime = performance.now();
                                            }
                                        } else {
                                            score -= 50;
                                            playAversiveShock();
                                            player.stunTimer = 1000;
                                            createParticles(player.x, player.y, '#ff0000');
                                            entities.splice(i, 1);
                                            continue;
                                        }
                                    } else if (e.type === 'crystal') {
                                        if (pointerDown && currentVelocity > DASH_VELOCITY_THRESHOLD) {
                                            const mag = Math.hypot(pointerVx, pointerVy);

                                            if (mag > 0) {
                                                e.vx = (pointerVx / mag) * 8;
                                                let new_vy = (pointerVy / mag) * 8;
                                                e.vy = new_vy < 0 ? 0 : new_vy;
                                                e.playerDeflected = true;
                                            }
                                        }
                                    }
                                }
                            }

                            const distToBot = Math.hypot(e.x - bot.x, e.y - bot.y);
                            if (distToBot < e.radius + bot.radius && e.active) {
                                if (e.type === 'hazard') {

                                    // BOT COLLISION FIX: If player sent it, 80% chance bot takes damage
                                    if (e.playerDeflected) {
                                        if (Math.random() < 0.90) {
                                            score += 100;
                                            bot.flashTimer = 500;
                                            playPositiveChime();
                                            createParticles(bot.x, bot.y, '#ffffff'); // White explosion for bot hit
                                            entities.splice(i, 1);
                                            continue;
                                        }
                                    }

                                    // Bot retaliates successfully
                                    if (Math.random() < bot_offensiveness) {
                                        e.vx = (Math.random() - 0.5) * 5;
                                        e.vy = 8;
                                    } else {
                                        e.vx = (bot.x > canvas.width / 2 ? -10 : 10);
                                        e.vy = 0;
                                    }
                                    e.playerDeflected = false;
                                }
                            }

                            if (e.y > canvas.height * 0.9) {
                                if (e.type === 'hazard') {
                                    score -= 20;
                                    playAversiveCrunch();
                                    createParticles(e.x, e.y, e.color);
                                } else if (e.type === 'crystal') {
                                    score += 50;
                                    playPositiveChime();
                                    createParticles(e.x, e.y, e.color);
                                }
                                entities.splice(i, 1);
                                continue;
                            }

                            if (e.y < canvas.height * 0.1) {
                                if (e.type === 'hazard') {
                                    score -= 20;
                                    playSharpAlert();
                                    bot.flashTimer = 500;
                                    createParticles(e.x, e.y, e.color);
                                }
                                entities.splice(i, 1);
                                continue;
                            }
                        }

                        for (let i = particles.length - 1; i >= 0; i--) {
                            let p = particles[i];
                            p.x += p.vx;
                            p.y += p.vy;
                            p.life -= dt;
                            if (p.life <= 0) particles.splice(i, 1);
                        }
                    }

                    function draw() {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);

                        ctx.fillStyle = '#440000';
                        ctx.fillRect(0, 0, canvas.width, canvas.height * 0.1);
                        ctx.fillStyle = '#000044';
                        ctx.fillRect(0, canvas.height * 0.9, canvas.width, canvas.height * 0.1);

                        ctx.fillStyle = '#ffffff';
                        ctx.font = '24px Arial';
                        ctx.textAlign = 'right';
                        ctx.fillText(`Score: ${score}`, canvas.width - 20, canvas.height / 2);


                        ctx.save();
                        ctx.translate(bot.x, bot.y);
                        ctx.beginPath();
                        ctx.arc(0, 0, bot.radius, 0, Math.PI * 2);
                        ctx.fillStyle = bot.flashTimer > 0 ? (Math.random() > 0.5 ? '#ffff00' : '#ff0000') : bot.color;
                        ctx.fill();
                        ctx.fillStyle = '#000';
                        ctx.fillRect(-8, -5, 4, 4);
                        ctx.fillRect(4, -5, 4, 4);
                        ctx.restore();

                        ctx.save();
                        ctx.globalAlpha = player.shielded ? 0.4 : 1.0;
                        ctx.translate(player.x, player.y);
                        ctx.beginPath();
                        ctx.fillStyle = player.stunTimer > 0 ? (Math.random() > 0.5 ? '#ffffff' : '#ff0000') : player.color;
                        ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
                        ctx.closePath();
                        ctx.fill();
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = player.color;
                        ctx.restore();

                        for (let e of entities) {
                            ctx.save();
                            ctx.translate(e.x, e.y);
                            if (e.type === 'hazard') {
                                ctx.fillStyle = e.color;
                                ctx.beginPath();
                                ctx.moveTo(0, -e.radius);
                                ctx.lineTo(e.radius, -e.radius / 2);
                                ctx.lineTo(e.radius * 0.8, e.radius);
                                ctx.lineTo(-e.radius * 0.8, e.radius);
                                ctx.lineTo(-e.radius, -e.radius / 2);
                                ctx.closePath();
                                ctx.fill();
                            } else {
                                ctx.fillStyle = e.color;
                                ctx.shadowBlur = 10;
                                ctx.shadowColor = e.color;
                                ctx.beginPath();
                                ctx.moveTo(0, -e.radius);
                                ctx.lineTo(e.radius / 2, 0);
                                ctx.lineTo(0, e.radius);
                                ctx.lineTo(-e.radius / 2, 0);
                                ctx.closePath();
                                ctx.fill();
                            }
                            ctx.restore();
                        }

                        for (let p of particles) {
                            ctx.globalAlpha = p.life / 600;
                            ctx.fillStyle = p.color;
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                            ctx.fill();
                        }
                        ctx.globalAlpha = 1.0;
                    }

                    function loop(time) {
                        if (isGameOver) return;
                        const dt = time - lastFrameTime;
                        lastFrameTime = time;

                        update(dt);
                        draw();

                        if (time - gameStartTime >= trial.duration) {
                            isGameOver = true;
                            endTrial();
                        } else {
                            animationId = requestAnimationFrame(loop);
                        }
                    }

                    function endTrial() {
                        window.removeEventListener('resize', resizeCanvas);
                        const trial_data = {
                            swipes_data: JSON.stringify(swipeData),
                            final_score: score
                        };
                        display_element.innerHTML = '';
                        jsPsych.finishTrial(trial_data);
                    }

                    requestAnimationFrame(loop);
                }
            }
            Plugin.info = info;
            return Plugin;
        })(jsPsychModule);

        const timeline = [];

        timeline.push({
            type: jsPsychInstructions,
            pages: [
                '<h2>Defense Game</h2><p>Welcome! In this game, you defend your base (bottom blue area) and attack the opponent (top red area).</p>',
                '<p>Hazards (orange/red rocks) will fall. ' + action_text + ' across the screen to dash and deflect them.</p><p>Energy Boosts (cyan crystals) will also fall. Guide them into your base for points.</p>',
                '<p>Drag straight down into your base to hide (shield mode).</p><p>Click next to start!</p>'
            ],
            show_clickable_nav: true
        });

        timeline.push({
            type: jsPsychContinuousDefense,
            duration: 120000
        });

        timeline.push({
            type: jsPsychHtmlButtonResponse,
            stimulus: function () {
                let last_trial_data = jsPsych.data.get().last(1).values()[0];
                return `<h1>Game Over</h1><p style="font-size: 60px; font-weight: bold;">Final Score: ${last_trial_data.final_score || 0}</p>`;
            },
            choices: ['Finish']
        });

        const save_data = {
            type: jsPsychPipe,
            action: "save",
            experiment_id: "GsG4J26A4XuX",
            filename: filename,
            data_string: () => jsPsych.data.get().csv()
        };
        timeline.push(save_data);

        jsPsych.run(timeline);
    </script>
</body>

</html>
