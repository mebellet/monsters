<!DOCTYPE html>
<html>
<head>
    <title>Monster Game - jsPsych Experiment</title>
    <script src="https://unpkg.com/jspsych@7"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response"></script>
    <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe"></script>
    <link href="https://unpkg.com/jspsych@7/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .jspsych-content {
            max-width: 800px;
            margin: 50px auto;
        }
    </style>
</head>
<body>
<div id="jspsych-target"></div>

<script>
    // Initialize jsPsych
    const jsPsych = initJsPsych({
        display_element: 'jspsych-target',
        on_finish: function() {
            console.log("Experiment completed!");
        }
    });

    // Generate unique subject ID
    const subject_id = jsPsych.randomization.randomID(10);
    const filename = `${subject_id}.csv`;

    // Create timeline
    const timeline = [];

    // Welcome trial
    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: '<h1>Welcome to the Monster Game!</h1><p>In this experiment, you will encounter monsters and make decisions.</p>',
        choices: ['Start Experiment'],
        on_finish: function(data) {
            data.subject_id = subject_id;
        }
    });

    // Example game trial - placeholder
    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: '<h1>🐲 A wild monster appears!</h1><p>What do you do?</p>',
        choices: ['Attack', 'Defend', 'Run Away'],
        on_finish: function(data) {
            data.subject_id = subject_id;
            data.trial_type = 'monster_encounter';
        }
    });

    // Add more trials here as needed
    // This is where you would add your game logic

    // End screen
    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: '<h1>Experiment Complete!</h1><p>Thank you for participating!</p>',
        choices: [],
        trial_duration: 3000,
        on_finish: function(data) {
            data.subject_id = subject_id;
        }
    });

    // Save data using OSF DataPipe
    const save_data = {
        type: jsPsychPipe,
        action: "save",
        experiment_id: "GsG4J26A4XuX",  // Replace with your OSF DataPipe experiment ID
        filename: filename,
        data_string: () => jsPsych.data.get().csv()
    };

    timeline.push(save_data);

    // Run the experiment
    jsPsych.run(timeline);
</script>
</body>
</html>
